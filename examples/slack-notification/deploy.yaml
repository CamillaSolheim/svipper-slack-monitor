services:
  - type: cron
    name: [VERKTØY_NAVN]
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    schedule: "*/5 * * * *"  # Hvert 5. minutt - juster etter behov
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: min-database
          property: connectionString
      - key: SLACK_BOT_TOKEN
        sync: false  # Må settes manuelt i Render Dashboard
      - key: SLACK_CHANNEL
        value: "#min-test-kanal"  # Juster etter behov
