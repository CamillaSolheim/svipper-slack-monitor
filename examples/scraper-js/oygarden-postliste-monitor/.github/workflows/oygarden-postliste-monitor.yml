name: Oygarden postliste monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/scraper-js/oygarden-postliste-monitor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: examples/scraper-js/oygarden-postliste-monitor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          SEARCH_TERM: båtvrak
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm run monitor
